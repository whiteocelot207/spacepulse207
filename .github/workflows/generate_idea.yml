# SpacePulse207 — Generate + Render + Deliver pipeline
name: Generate Short Idea

on:
  schedule:
    - cron: '7 11 * * *'   # 7:00 AM ET  — morning commute
    - cron: '7 16 * * *'   # 12:00 PM ET — lunch break
    - cron: '7 21 * * *'   # 5:00 PM ET  — after work
    - cron: '7 0 * * *'    # 8:00 PM ET  — prime time
    - cron: '37 2 * * *'   # 10:30 PM ET — late night scroll

  workflow_dispatch:
    inputs:
      delivery_mode:
        description: "Delivery mode — where to send the rendered video"
        required: false
        default: "telegram"
        type: choice
        options:
          - youtube       # upload ke YouTube saja
          - telegram      # kirim ke Telegram saja
          - both          # upload YouTube DAN kirim ke Telegram
      no_upload:
        description: "Skip all delivery? (test/dry-run mode)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      tts_enabled:
        description: "Enable Edge-TTS narration for scenes?"
        required: false
        default: "true"
        type: choice
        options: ["false", "true"]
      tts_voice:
        description: "TTS voice (e.g. en-US-GuyNeural, en-GB-RyanNeural)"
        required: false
        default: "en-US-GuyNeural"
      outro_tts_enabled:
        description: "Enable TTS for the outro card?"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      channel_name:
        description: "Channel name shown on outro"
        required: false
        default: "spacepulse207"

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Debug time
        run: date

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick
          sudo sed -i 's/rights="none" pattern="@\*"/rights="read|write" pattern="@*"/' /etc/ImageMagick-6/policy.xml || true
          sudo sed -i '/<policy domain="path" rights="none" pattern="@\*"/d' /etc/ImageMagick-6/policy.xml || true

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install requests Pillow numpy
          pip install moviepy==1.0.3
          pip install edge-tts
          pip install google-auth google-auth-oauthlib google-api-python-client

      # ── Cleanup video folder sebelum render
      - name: Clean up old video files
        run: |
          echo "🧹 Cleaning videos_output/..."
          mkdir -p videos_output
          find videos_output/ -type f \( -name "*.mp4" -o -name "*.avi" -o -name "*.mov" -o -name "*.mkv" \) -delete
          echo "✅ Done. Folder contents:"
          ls -lah videos_output/ || echo "  (empty)"

      - name: Generate idea
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/idea_generator.py

      - name: Format script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/script_formatter.py

      - name: Render video
        env:
          NO_UPLOAD:         ${{ github.event.inputs.no_upload         || 'false' }}
          TTS_ENABLED:       ${{ github.event.inputs.tts_enabled       || 'true' }}
          TTS_VOICE:         ${{ github.event.inputs.tts_voice         || 'en-US-GuyNeural' }}
          OUTRO_TTS_ENABLED: ${{ github.event.inputs.outro_tts_enabled || 'false' }}
          CHANNEL_NAME:      ${{ secrets.CHANNEL_NAME || github.event.inputs.channel_name || 'spacepulse207' }}
        run: |
          ARGS=""
          [ "$NO_UPLOAD"         = "true" ] && ARGS="$ARGS --no-upload"
          [ "$TTS_ENABLED"       = "true" ] && ARGS="$ARGS --tts --voice $TTS_VOICE" || ARGS="$ARGS --no-tts"
          [ "$OUTRO_TTS_ENABLED" = "true" ] && ARGS="$ARGS --outro-tts"              || ARGS="$ARGS --no-outro-tts"
          echo "Running: python scripts/video_renderer.py $ARGS"
          python scripts/video_renderer.py $ARGS

      # ─────────────────────────────────────────────────────────────────────────
      # DELIVERY — baca DELIVERY_MODE dari secret (default) atau workflow input
      # Priority: workflow_dispatch input > secret DELIVERY_MODE > fallback "youtube"
      # ─────────────────────────────────────────────────────────────────────────

      - name: Resolve delivery mode
        id: delivery
        run: |
          INPUT_MODE="${{ github.event.inputs.delivery_mode }}"
          SECRET_MODE="${{ secrets.DELIVERY_MODE }}"
          NO_UPLOAD="${{ github.event.inputs.no_upload || 'false' }}"

          if [ "$NO_UPLOAD" = "true" ]; then
            MODE="none"
          elif [ -n "$INPUT_MODE" ]; then
            MODE="$INPUT_MODE"
          elif [ -n "$SECRET_MODE" ]; then
            MODE="$SECRET_MODE"
          else
            MODE="youtube"
          fi

          echo "📦 Delivery mode resolved: $MODE"
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"

      # ── YouTube ──────────────────────────────────────────────────────────────
      - name: Upload to YouTube
        if: |
          steps.delivery.outputs.mode == 'youtube' ||
          steps.delivery.outputs.mode == 'both'
        env:
          DELIVERY_MODE:         ${{ steps.delivery.outputs.mode }}
          YOUTUBE_TOKEN:         ${{ secrets.YOUTUBE_TOKEN }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
        run: python scripts/youtube_uploader.py

      # ── Telegram ─────────────────────────────────────────────────────────────
      - name: Send to Telegram
        if: |
          steps.delivery.outputs.mode == 'telegram' ||
          steps.delivery.outputs.mode == 'both'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/telegram_sender.py

      # ── Simpan hanya file data, BUKAN video
      - name: Save data to repository
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add ideas.json data/ scripts_output/ || true
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "🚀 Short delivered [$(date +'%Y-%m-%d %H:%M UTC')] mode=${{ steps.delivery.outputs.mode }}" && git push

      - name: Upload video artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rendered-video-${{ github.run_number }}
          path: |
            videos_output/*.mp4
            videos_output/*_meta.json
          retention-days: 30
          if-no-files-found: warn
